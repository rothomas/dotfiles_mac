[python]
format = '[ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "none"

[ruby]
format = '[ $symbol($version )]($style)'
style = "none"

[rust]
format = '[ $symbol($version )]($style)'
style = "none"

[status]
disabled = false
format = '[$symbol]($style)'
success_symbol = '[âœ” ](bold green)[î‚²](fg:blue bg:black)'
symbol = '[î‚²](fg:red bg:black)[ $status âœ— ](fg:yellow bg:red)[î‚²](fg:blue bg:red)'

[time]
disabled = false
style = "bg:white fg:black"
format = '[$time ï€—]($style)'
time_format = '%T'

[username]
style_root = "bg:white fg:bright-red"
style_user = "bg:white fg:black"
format = '[ $user]($style)'

[custom.dir_right_git]
when = "git rev-parse --is-inside-work-tree"
format = "[î‚¼](fg:blue bg:green)"

[custom.dir_right_no_git]
when = "! git rev-parse --is-inside-work-tree"
format = "[î‚°](fg:blue bg:black)"

[custom.git_right]
when = "git rev-parse --is-inside-work-tree"
format = "[î‚°](fg:green bg:black)"


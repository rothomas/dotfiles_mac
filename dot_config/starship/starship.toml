# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = "$os $hostname $directory $git_branch $git_status"
right_format = "$character $direnv $package $username"

[character]
success_symbol = '[✔](bold green)'
error_symbol = '[✗](bold red)'

[directory]
style = "bg:blue fg:white"

[os]
disabled = false
format = "[](fg:white bg:black)[ $os ](fg:black bg:white)[](fg:white bg:black)" 
[os.symbols]
Linux = ''
Macos = ''
Ubuntu = ''

[time]
disabled = false
style = "bg:white fg:black"
format = '[$time]($style)'
time_format = '%T'

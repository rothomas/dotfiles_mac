## Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """
[î‚¶](bg:black fg:white)\
[ $os $hostname](bg:white)\
[î‚¼](bg:blue fg:white)\
[ $directory](bg:blue)\
${custom.dir_right_git}${custom.dir_right_no_git}\
$git_branch\
$git_status\
${custom.git_right} """

right_format = """
$status\
[$python$ruby$nodejs$rust ](fg:black bg:blue)\
[î‚²](fg:white bg:blue)\
$username\
[ $time ](fg:black bg:white)\
[î‚´](fg:white bg:black)"""

[directory]
style = "bg:blue fg:bright-white"

[git_branch]
format = "[$symbol$branch(:$remote_branch) ]($style)"
style = "bg:green fg:black"
symbol = " ï„“ ï„¦ "

[git_status]
style = "bg:green fg:black"
format = "[$all_status$ahead_behind ]($style)"

[hostname]
style = "bg:white fg:black"
format = "[$hostname ]($style)"

[nodejs]
format = '[ $symbol($version )]($style)'
style = "none"

[os]
disabled = false
style = "bg:white fg:black"
[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"

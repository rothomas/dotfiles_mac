## Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """
[о‚¶](bg:black fg:white)\
[ $os $hostname](bg:white)\
[о‚ј](bg:blue fg:white)\
[ $directory](bg:blue)\
${custom.dir_right_git}${custom.dir_right_no_git}\
$git_branch\
$git_status\
${custom.git_right} """

right_format = """
$cmd_duration \
$status\
[$python$ruby$nodejs$rust ](fg:black bg:blue)\
[о‚І](fg:white bg:blue)\
$username\
[ $time ](fg:black bg:white)\
[о‚ґ](fg:white bg:black)"""

[cmd_duration]
format = '[о‚¶](fg:yellow bg:black)[$duration п‰’]($style)[о‚ґ](fg:yellow bg:black)'
style = 'fg:black bg:yellow'

[directory]
format = '[$read_only]($read_only_style)[$path]($style) '
style = "bg:blue fg:bright-white"
read_only = 'пЂЈ '
read_only_style = 'bg:blue fg:bright-white'
home_symbol = 'пЂ• ~'


[git_branch]
format = "[$symbol$branch(:$remote_branch) ]($style)"
style = "bg:green fg:black"
symbol = " п„“ п„¦ "

[git_status]
style = "bg:green fg:black"
format = "[$all_status$ahead_behind ]($style)"

[hostname]
style = "bg:white fg:black"
format = "[$hostname ]($style)"

[nodejs]
format = '[ $symbol($version )]($style)'
style = "none"

[os]
disabled = false
style = "bg:white fg:black"
[os.symbols]
Windows = "у°ЌІ"
Ubuntu = "у°•€"
SUSE = "пЊ”"
Raspbian = "у°ђї"
Mint = "у°Ј­"
Macos = "у°Ђµ"
Manjaro = "пЊ’"
Linux = "у°ЊЅ"
Gentoo = "у°ЈЁ"
Fedora = "у°Ј›"
Alpine = "пЊЂ"
Amazon = "п‰°"
Android = "оњЋ"
AOSC = "пЊЃ"
Arch = "у°Ј‡"
Artix = "у°Ј‡"
EndeavourOS = "п†—"
CentOS = "пЊ„"
Debian = "у°Јљ"
Redhat = "у±„›"
RedHatEnterprise = "у±„›"
Pop = "пЊЄ"

[python]
format = '[ ${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "none"

[ruby]
format = '[ $symbol($version )]($style)'
style = "none"

[rust]
format = '[ $symbol($version )]($style)'
style = "none"

[status]
disabled = false
format = '[$symbol]($style)'
success_symbol = '[вњ” ](bold green)[о‚І](fg:blue bg:black)'
symbol = '[о‚І](fg:red bg:black)[ $status вњ— ](fg:yellow bg:red)[о‚І](fg:blue bg:red)'

[time]
disabled = false
style = "bg:white fg:black"
format = '[$time пЂ—]($style)'
time_format = '%T'

[username]
style_root = "bg:white fg:bright-red"
style_user = "bg:white fg:black"
format = '[ $user]($style)'

[custom.dir_right_git]
when = "git rev-parse --is-inside-work-tree"
format = "[о‚ј](fg:blue bg:green)"

[custom.dir_right_no_git]
when = "! git rev-parse --is-inside-work-tree"
format = "[о‚°](fg:blue bg:black)"

[custom.git_right]
when = "git rev-parse --is-inside-work-tree"
format = "[о‚°](fg:green bg:black)"

